server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        mvc:
          - id: auth-service
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/api/auth/**
          - id: game-service
            uri: lb://GAME-SERVICE
            predicates:
              - Path=/api/game/**
          - id: analytics-service
            uri: lb://ANALYTICS-SERVICE
            predicates:
              - Path=/api/analytics/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway