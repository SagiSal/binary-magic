spring:
  application:
    name: auth-service
  # No DB, no Redis — this service is stateless
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

server:
  port: 8081

jwt:
  secret: change_me_generate_a_real_secret_with_openssl_rand_hex_64
  anonymous-ttl-hours: ${JWT_ANONYMOUS_TTL_HOURS:24}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.binarymagic: DEBUG
